<!-- @dsCard group="Provider app" viewport="440x860" name="Provider app" subtitle="The cool sibling — job feed, round-robin offer, fast pay" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kept Connect — Provider app</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: #0E0D0A; font-family: var(--font-ui); -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center; padding: 24px; }
  .phone { width: 390px; height: 820px; background: var(--chrome); border-radius: 46px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3), 0 30px 70px rgba(0,0,0,0.5);
    border: 11px solid #000; overflow: hidden; position: relative; }
  .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 128px; height: 30px;
    background: #000; border-radius: 0 0 18px 18px; z-index: 50; }
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; }
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div id="app" class="screen"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  function App() {
    const [tab, setTab] = useState('jobs');
    const [job, setJob] = useState(false);
    if (job) return <ActiveScreen onBack={() => setJob(false)} />;
    return (
      <>
        {tab === 'jobs' && <FeedScreen onOpenJob={() => setJob(true)} />}
        {tab === 'active' && <FeedScreen onOpenJob={() => setJob(true)} />}
        {tab === 'earnings' && <EarningsScreen />}
        {tab === 'you' && <EarningsScreen />}
        <VBottomNav tab={tab} setTab={setTab} />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
