<!-- @dsCard group="Components" viewport="700x220" name="Category icons" subtitle="The 8 service families — neutral chip, family-colored glyph" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-ui); }
  .wrap { padding: 22px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .lab { font-size: 11px; color: var(--ink-2); font-weight: 500; }
  .dark { margin-top: 16px; background: var(--chrome); border-radius: var(--r-card); padding: 16px 22px; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { CategoryIcon, CATEGORIES } = window.KeptConnectDesignSystem_4a1eb7;
  const fams = Object.keys(CATEGORIES);
  function Demo() {
    return (
      <>
        <div className="grid">
          {fams.map((f) => (
            <div className="cell" key={f}>
              <CategoryIcon category={f} size={46} />
              <span className="lab">{CATEGORIES[f].label}</span>
            </div>
          ))}
        </div>
        <div className="dark">
          <div className="grid">
            {fams.map((f) => (
              <div className="cell" key={f}>
                <CategoryIcon category={f} size={42} dark />
                <span className="lab" style={{ color: 'var(--chrome-dim)' }}>{CATEGORIES[f].label}</span>
              </div>
            ))}
          </div>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
