<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-ui); }
  .wrap { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .ttl { font-family: var(--font-display); font-weight: 500; font-size: 17px; margin: 0 0 4px; }
  .sub { font-size: 13px; color: var(--ink-2); margin: 0; }
  .price { font-family: var(--font-ui); font-weight: 500; font-size: 22px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Card } = window.KeptConnectDesignSystem_4a1eb7;
  function Demo() {
    return (
      <>
        <Card tone="moment" padding={22}>
          <p className="ttl">What needs doing?</p>
          <p className="sub">Warm cream — human moments only.</p>
        </Card>
        <Card tone="paper" lift padding={22}>
          <p className="sub" style={{marginBottom:6}}>Marco's quote</p>
          <span className="price">$240.00</span>
        </Card>
        <Card tone="paper" ribbon="sameday" padding={22}>
          <p className="ttl" style={{fontSize:15, fontFamily:'var(--font-ui)'}}>Leak under kitchen sink</p>
          <p className="sub">Ribbon edge — same-day urgency.</p>
        </Card>
        <Card tone="chrome" ribbon="emerald" padding={22}>
          <p className="ttl" style={{fontSize:15, fontFamily:'var(--font-ui)', color:'var(--cream)'}}>New offer</p>
          <p className="sub" style={{color:'var(--ink-3)'}}>Dark provider-app card.</p>
        </Card>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
