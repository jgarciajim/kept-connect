<!-- @dsCard group="Colors" viewport="700x150" name="Emerald — verified only" subtitle="TIER 2. The verified check + 'safe' affirmations. Nothing else." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-ui); }
  .wrap { padding: 20px; display: flex; gap: 22px; align-items: center; }
  .pair { display: flex; gap: 14px; }
  .cell { display: flex; flex-direction: column; }
  .sw { border-radius: var(--r-chip); height: 76px; width: 120px; border: 1px solid var(--hairline); }
  .n { font-size: 12px; color: var(--ink); margin: 9px 0 2px; font-weight: 500; }
  .h { font-size: 11px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
  .demo { display: flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 500; color: var(--ink); }
  .note { font-size: 12px; color: var(--ink-2); max-width: 22ch; line-height: 1.45; }
</style>
</head>
<body>
<div class="wrap">
  <div class="pair">
    <div class="cell"><div class="sw" style="background:var(--verified)"></div><div class="n">Verified</div><div class="h">#2C8A63 · on light</div></div>
    <div class="cell"><div class="sw" style="background:var(--verified-bright)"></div><div class="n">Bright</div><div class="h">#57B98E · on dark</div></div>
  </div>
  <div class="demo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="var(--verified)"/><path d="M8 12.2 L10.8 15 L16 9.4" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="note">Green follows the universal "verified" convention — the one place to follow convention over brand.</span>
  </div>
</div>
</body>
</html>
