<!-- @dsCard group="Brand" viewport="700x170" name="Color carries meaning" subtitle="Terracotta = action · emerald = verified · category = which trade" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-ui); color: var(--ink); }
  .wrap { padding: 22px; display: flex; align-items: center; gap: 26px; flex-wrap: wrap; }
  .tier { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .btn { background: var(--terracotta); color: var(--cream); border-radius: var(--r-pill); padding: 11px 22px; font-weight: 500; font-size: 15px; }
  .check { display: inline-flex; align-items: center; gap: 6px; font-weight: 500; font-size: 14px; }
  .cats { display: flex; gap: 6px; }
  .chip { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .tlab { font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="wrap">
  <div class="tier"><span class="btn">Post</span><span class="tlab">Terracotta · action</span></div>
  <div class="tier">
    <span class="check">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="var(--verified)"/><path d="M8 12.2 L10.8 15 L16 9.4" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Verified
    </span>
    <span class="tlab">Emerald · trust</span>
  </div>
  <div class="tier">
    <div class="cats">
      <span class="chip" style="background:rgb(228,231,234)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--cat-water)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5C12 3.5 6.5 9.5 6.5 14a5.5 5.5 0 0 0 11 0C17.5 9.5 12 3.5 12 3.5z"/></svg></span>
      <span class="chip" style="background:rgb(250,243,229)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--cat-power)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3 6.5 13H11l-.5 8 7-10.5H12.5z"/></svg></span>
      <span class="chip" style="background:rgb(236,233,247)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--cat-surfaces)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="5" width="12" height="6" rx="2.2"/><path d="M10.5 11v3.2h-3V20"/></svg></span>
    </div>
    <span class="tlab">Category · which trade</span>
  </div>
</div>
</body>
</html>
