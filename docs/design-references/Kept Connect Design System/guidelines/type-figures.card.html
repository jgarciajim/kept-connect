<!-- @dsCard group="Type" viewport="700x170" name="Figures — tabular money" subtitle="Tabular nums, right-aligned on the decimal" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-ui); color: var(--ink); }
  .wrap { padding: 22px; }
  table { border-collapse: collapse; width: 280px; }
  td { padding: 7px 0; font-size: 16px; font-variant-numeric: tabular-nums lining-nums; }
  td.lbl { color: var(--ink-2); font-size: 14px; }
  td.num { text-align: right; font-weight: 500; }
  .meta { font-size: 11px; color: var(--ink-3); margin-top: 14px; }
  tr + tr td { border-top: 1px solid var(--hairline); }
</style>
</head>
<body>
<div class="wrap">
  <table>
    <tr><td class="lbl">Marco Reyes</td><td class="num">$240.00</td></tr>
    <tr><td class="lbl">Dana Liu</td><td class="num">$1,180.50</td></tr>
    <tr><td class="lbl">Sam Cole</td><td class="num">$95.00</td></tr>
  </table>
  <p class="meta">Hanken tabular-nums · money right-aligned on the decimal · the one prominent figure</p>
</div>
</body>
</html>
