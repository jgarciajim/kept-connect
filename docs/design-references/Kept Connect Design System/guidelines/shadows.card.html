<!-- @dsCard group="Spacing" viewport="700x160" name="Shadows" subtitle="Soft, warm, restrained — paper-first" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-ui); color: var(--ink); }
  .row { display: flex; gap: 26px; padding: 28px; align-items: center; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 110px; height: 64px; background: var(--paper); border-radius: var(--r-card); }
  .n { font-size: 12px; font-weight: 500; }
</style>
</head>
<body>
<div class="row">
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="n">sm</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-card)"></div><div class="n">card</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-lift)"></div><div class="n">lift</div></div>
</div>
</body>
</html>
