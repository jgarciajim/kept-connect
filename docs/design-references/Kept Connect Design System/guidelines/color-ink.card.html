<!-- @dsCard group="Colors" viewport="700x150" name="Ink scale" subtitle="Three weights of text on canvas" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-ui); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 20px; }
  .sw { border-radius: var(--r-chip); height: 76px; }
  .n { font-size: 12px; color: var(--ink); margin: 9px 0 2px; font-weight: 500; }
  .h { font-size: 11px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
  .cell { display: flex; flex-direction: column; }
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><div class="sw" style="background:var(--ink)"></div><div class="n">Ink</div><div class="h">#1B1C19 · primary text</div></div>
  <div class="cell"><div class="sw" style="background:var(--ink-2)"></div><div class="n">Ink 2</div><div class="h">#6E6C63 · supporting</div></div>
  <div class="cell"><div class="sw" style="background:var(--ink-3)"></div><div class="n">Ink 3</div><div class="h">#A4A299 · quiet / captions</div></div>
</div>
</body>
</html>
