<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-ui); color: var(--ink); }
  .wrap { padding: 22px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 12px; }
  .meta { font-size: 11px; color: var(--ink-3); }
  p { margin: 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><p style="font-size:18px;font-weight:500">Post under a minute — one obvious tap.</p><span class="meta">Text LG · 18 / 500</span></div>
  <div class="row"><p style="font-size:15px;font-weight:400">A stranger is coming to someone's home; every surface should quietly reassure.</p><span class="meta">Base · 15 / 400</span></div>
  <div class="row"><p style="font-size:13px;font-weight:400;color:var(--ink-2)">Auto-filled from your saved properties</p><span class="meta">Text SM · 13 / 400</span></div>
  <div class="row"><p style="font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-3)">Background checked</p><span class="meta">Text XS · 11 / 500</span></div>
</div>
</body>
</html>
