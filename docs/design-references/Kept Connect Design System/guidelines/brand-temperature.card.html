<!-- @dsCard group="Brand" viewport="700x200" name="Moment vs data" subtitle="The warmth budget — welcoming vs informing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-ui); color: var(--ink); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 20px; }
  .panel { border-radius: var(--r-card); padding: 20px; min-height: 120px; }
  .moment { background: var(--moment); }
  .data { background: var(--paper); border: 1px solid var(--hairline); }
  .kicker { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin: 0 0 10px; }
  .d { font-family: var(--font-display); font-weight: 500; font-size: 24px; margin: 0; letter-spacing: -0.015em; }
  .dot { color: var(--terracotta); }
  .price { font-size: 26px; font-weight: 500; font-variant-numeric: tabular-nums; margin: 0; }
  .sub { font-size: 12px; color: var(--ink-2); margin: 6px 0 0; }
</style>
</head>
<body>
<div class="grid">
  <div class="panel moment">
    <p class="kicker">Moment · warmth allowed</p>
    <p class="d">Finding your provider…</p>
    <p class="sub">Welcoming someone → warm cream, Fraunces, airy.</p>
  </div>
  <div class="panel data">
    <p class="kicker">Data · clean paper</p>
    <p class="price">$240.00</p>
    <p class="sub">Informing someone → paper, tabular, near-mono.</p>
  </div>
</div>
</body>
</html>
