<!-- @dsCard group="Colors" viewport="700x150" name="Terracotta — brand & action" subtitle="TIER 1. Brand + every primary action + live. Never decorative." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-ui); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 20px; }
  .sw { border-radius: var(--r-chip); height: 76px; border: 1px solid var(--hairline); }
  .n { font-size: 12px; color: var(--ink); margin: 9px 0 2px; font-weight: 500; }
  .h { font-size: 11px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
  .cell { display: flex; flex-direction: column; }
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><div class="sw" style="background:var(--terracotta)"></div><div class="n">Terracotta</div><div class="h">#BD5E39 · brand / action</div></div>
  <div class="cell"><div class="sw" style="background:var(--terracotta-deep)"></div><div class="n">Deep</div><div class="h">#A8502F · icon / pressed</div></div>
  <div class="cell"><div class="sw" style="background:var(--terracotta-bright)"></div><div class="n">Bright</div><div class="h">#CF6E45 · on dark</div></div>
  <div class="cell"><div class="sw" style="background:var(--terracotta-tint)"></div><div class="n">Tint</div><div class="h">#F3E5DC · selected / halo</div></div>
</div>
</body>
</html>
