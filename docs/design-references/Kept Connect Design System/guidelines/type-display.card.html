<!-- @dsCard group="Type" viewport="700x230" name="Fraunces — display" subtitle="Human moments. Sentence case, emerald period flourish." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-ui); }
  .wrap { padding: 22px; display: flex; flex-direction: column; gap: 14px; }
  .d { font-family: var(--font-display); font-weight: 500; color: var(--ink); line-height: 1.1; letter-spacing: -0.015em; margin: 0; }
  .dot { color: var(--terracotta); }
  .meta { font-size: 11px; color: var(--ink-3); margin-left: 12px; font-family: var(--font-ui); font-weight: 400; letter-spacing: 0; }
  .row { display: flex; align-items: baseline; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><p class="d" style="font-size:44px">Get it handled<span class="dot">.</span></p><span class="meta">Display XL · 44 / 500</span></div>
  <div class="row"><p class="d" style="font-size:34px">Finding your provider…</p><span class="meta">Display LG · 34 / 500</span></div>
  <div class="row"><p class="d" style="font-size:26px">What needs doing?</p><span class="meta">Display MD · 26 / 500</span></div>
  <div class="row"><p class="d" style="font-size:20px">Marco's quote</p><span class="meta">Display SM · 20 / 500</span></div>
</div>
</body>
</html>
