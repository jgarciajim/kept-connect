<!-- @template name="Provider app — Today" description="The cool dark trades app: greeting, fast-pay strip, and open offers — speed and clarity, near-zero warmth." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kept Connect — Provider template</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: #0E0D0A; font-family: var(--font-ui, sans-serif); -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center; padding: 24px; }
  .phone { width: 390px; height: 760px; background: var(--chrome); border-radius: 44px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3), 0 30px 70px rgba(0,0,0,0.5);
    border: 11px solid #000; overflow: hidden; position: relative; }
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div class="phone"><div id="app" style="position:absolute;inset:0;display:flex;flex-direction:column"></div></div>
<script type="text/babel" data-presets="react">
  function waitForNS(cb) {
    const ns = window.KeptConnectDesignSystem_4a1eb7;
    if (ns && ns.Button) return cb(ns);
    setTimeout(() => waitForNS(cb), 30);
  }
  waitForNS((DS) => {
    const { Avatar, CategoryIcon } = DS;
    const OFFERS = [
      { id: 1, cat: 'water', title: 'Faucet replacement', place: 'Breckenridge', dist: '1.2 mi', pay: '120', note: 'est. 45 min · paid on completion', timer: '0:43' },
      { id: 2, cat: 'power', title: 'Outlet install ×3', place: 'Frisco', dist: '3.1 mi', pay: '180', note: 'est. 1 hr · paid on completion', timer: '1:12' },
    ];
    const dim = (o) => `rgba(233,230,221,${o})`;
    function Offer({ j }) {
      return (
        <div style={{ position: 'relative', background: 'var(--chrome-card-2)', border: '1px solid var(--terracotta-deep)', borderRadius: 18, padding: 14 }}>
          <span style={{ position: 'absolute', top: 12, right: 14, fontSize: 11, color: 'var(--terracotta-bright)', fontVariantNumeric: 'tabular-nums' }}>{j.timer}</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: 11 }}>
            <CategoryIcon category={j.cat} size={42} dark />
            <div>
              <div style={{ fontSize: 14.5, fontWeight: 500, color: 'var(--chrome-cream)' }}>{j.title}</div>
              <div style={{ fontSize: 12, color: dim(0.55), marginTop: 1 }}>{j.place} · {j.dist} away</div>
            </div>
          </div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, margin: '12px 0' }}>
            <span style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 24, color: 'var(--chrome-cream)', fontVariantNumeric: 'tabular-nums' }}>${j.pay}</span>
            <span style={{ fontSize: 11.5, color: dim(0.55) }}>{j.note}</span>
          </div>
          <div style={{ display: 'flex', gap: 9 }}>
            <button style={{ flex: 1, borderRadius: 999, padding: 11, fontSize: 13.5, fontWeight: 500, background: 'transparent', color: dim(0.55), border: '1px solid var(--chrome-line)', cursor: 'pointer', fontFamily: 'var(--font-ui)' }}>Decline</button>
            <button style={{ flex: 1, borderRadius: 999, padding: 11, fontSize: 13.5, fontWeight: 500, background: 'var(--terracotta-bright)', color: 'var(--cream)', border: 'none', cursor: 'pointer', fontFamily: 'var(--font-ui)' }}>Accept</button>
          </div>
        </div>
      );
    }
    function Today() {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--chrome)' }}>
          <div style={{ flex: 1, overflowY: 'auto', padding: '46px 18px 18px' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
              <div>
                <p style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 28, margin: 0, color: 'var(--chrome-cream)', letterSpacing: '-0.015em' }}>Today<span style={{ color: 'var(--terracotta-bright)' }}>.</span></p>
                <p style={{ margin: '3px 0 0', fontSize: 13, color: dim(0.55) }}>2 open offers near you</p>
              </div>
              <Avatar name="Marco Reyes" size={40} status="onsite" />
            </div>
            <div style={{ display: 'flex', alignItems: 'center', background: 'var(--chrome-card)', border: '1px solid var(--chrome-line)', borderRadius: 16, padding: '14px 16px', marginBottom: 22 }}>
              <div>
                <div style={{ fontSize: 12, color: dim(0.55) }}>Available to cash out</div>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 24, color: 'var(--chrome-cream)', fontVariantNumeric: 'tabular-nums', marginTop: 1 }}>$340.00</div>
              </div>
              <button style={{ marginLeft: 'auto', height: 40, padding: '0 16px', borderRadius: 999, border: 'none', background: 'var(--terracotta-bright)', color: 'var(--cream)', fontFamily: 'var(--font-ui)', fontWeight: 500, fontSize: 13.5, cursor: 'pointer' }}>Cash out</button>
            </div>
            <div style={{ fontSize: 11.5, color: dim(0.45), fontWeight: 500, marginBottom: 11 }}>New offers</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {OFFERS.map((j) => <Offer key={j.id} j={j} />)}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('app')).render(<Today />);
  });
</script>
</body>
</html>
